name: PikPak Auto Register

on:
  schedule:
    - cron: '0 0,4,8,12,16,20 * * *'
  workflow_dispatch:
    inputs:
      rounds:
        description: Accounts to register this run
        required: false
        default: '2'

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: 'true'

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js deps
        run: npm install

      - name: Set up WARP (SOCKS5 proxy)
        uses: fscarmen/warp-on-actions@v1.4
        with:
          mode: client
          stack: dual

      - name: Configure WARP to SOCKS5 proxy mode
        run: |
          sudo warp-cli --accept-tos disconnect || true
          sleep 3
          sudo warp-cli --accept-tos mode proxy || sudo warp-cli --accept-tos set-mode proxy || true
          sudo warp-cli --accept-tos proxy port 40000 || sudo warp-cli --accept-tos set-proxy-port 40000 || true
          sudo warp-cli --accept-tos connect || true
          sleep 5
          echo "WARP SOCKS5 proxy ready at 127.0.0.1:40000"
          curl -I --connect-timeout 5 --socks5-hostname 127.0.0.1:40000 https://ifconfig.me 2>&1 | head -3

      - name: Run registration
        id: run
        env:
          INVITE_LINK: ${{ secrets.PIKPAK_INVITE_LINK }}
          PROXY_GATEWAY: ${{ secrets.PROXY_GATEWAY || 'socks5://127.0.0.1:40000' }}
          MAX_ROUNDS: ${{ github.event.inputs.rounds || '2' }}
          MAX_DAILY_TOTAL: '10'
          DELAY_MINUTES: '0'
        run: python github_action_runner.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: register-results
          path: |
            batch_result_protocol.txt
            debug.log
          retention-days: 30

      - name: Upload daily counter
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-counter
          path: /tmp/pikpak_counter.json
          retention-days: 1
